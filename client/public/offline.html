<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Offline - Becxus</title>
    <style>
      html, body { height: 100%; }
      body { margin: 0; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif; }
      .card { max-width: 420px; width: 90%; background: #111; border: 1px solid #252525; border-radius: 16px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
      .title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
      .desc { font-size: 14px; color: #bbb; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">You're offline</div>
      <div class="desc">Some features are unavailable. Please check your connection. Cached pages remain accessible.</div>
    </div>
  </body>
</html>
