# Nixpacks configuration for Coolify deployment
# Fixes sharp and other native module compilation issues

[phases.setup]
nixPkgs = ["nodejs_22", "npm-10_x", "python3", "pkg-config", "vips", "libjpeg", "libpng", "gcc"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"

[variables]
NODE_ENV = "production"
NPM_CONFIG_LOGLEVEL = "warn"
SHARP_IGNORE_GLOBAL_LIBVIPS = "1"
NIXPACKS_NODE_VERSION = "22"
